services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashboard_api_app
    restart: always
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      mysql-db:
        condition: service_healthy

  mysql-db:
    image: mysql:8.0
    container_name: dashboard_mysql
    restart: always
    environment:
      MYSQL_DATABASE: dashboard_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      timeout: 20s
      retries: 10

  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"

volumes:
  mysql_data:  
